<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicar tarea</title>
  <link rel="stylesheet" href="../styles/styles.css">
</head>
<body class="layout">
    <aside class="sidebar">
        <header class="brand">
            <img src="../assets/totoro.png" alt="Logo Task Repository">
            <h2>TR</h2>
        </header>

        <nav aria-label="Menú principal">
            <ul class="menu">
                <li>
                    <a href="#" aria-disabled="true">
                        <img src="../assets/alarm-gray.svg" alt="" class="menu-icon">
                        <span>Actividad</span>
                    </a>
                </li>
                <li>
                    <a href="./class-dashboard.html">
                        <img src="../assets/contact-gray.svg" alt="" class="menu-icon">
                        <span>Equipos</span>
                    </a>
                </li>
                <li>
                    <a href="./assignment-list.html" class="active" aria-current="page">
                        <img src="../assets/task-green.svg" alt="" class="menu-icon">
                        <span>Tareas</span>
                    </a>
                </li>
            </ul>
        </nav>

        <footer class="sidebar-footer">
            <button type="button" class="new-class-button">Nueva Tarea</button>
        </footer>
    </aside>

    <main class="page page-form">
        <header class="topbar">
            <h1>Task Repository</h1>
        </header>

        <section class="assignment-form-section scrollable-section" aria-labelledby="publish-assignment-title">
            <p class="breadcrumb">Portal / Tareas / Publicar tarea</p>
            <h2 id="publish-assignment-title">Publicar tarea</h2>
            <p>Completa los datos para crear y publicar una nueva tarea en su clase.</p>

            <form id="create-assignment-form" class="form-card" novalidate>

                <label for="class-id">Clase</label>
                <select id="class-id" name="classId" required>
                    <option value="" disabled selected>Seleccione una clase</option>
                </select>

                <label for="title">Título</label>
                <input
                    type="text"
                    id="title"
                    name="title"
                    placeholder="Ej. Informe de laboratorio 1"
                    maxlength="120"
                    required
                >

                <label for="description">Descripción / instrucciones</label>
                <textarea
                    id="description"
                    name="description"
                    placeholder="Describe brevemente las instrucciones de la tarea"
                    required
                ></textarea>

                <fieldset class="form-row">
                    <p>
                        <label for="max-score">Puntaje máximo</label>
                            <input
                                type="number"
                                id="max-score"
                                name="maxScore"
                                min="0"
                                max="100"
                                placeholder="100"
                                required
                            >
                    </p>

                    <p>
                        <label for="due-date">Fecha y hora límite</label>
                            <input
                                type="datetime-local"
                                id="due-date"
                                name="dueDate"
                                required
                            >
                    </p>
                </fieldset>

                <label for="attachment">
                    Archivo adjunto <span class="form-hint">(opcional)</span>
                </label>
                <input
                    type="file"
                    id="attachment"
                    name="attachment"
                    accept=".pdf,.doc,.docx,.png,.jpg,.jpeg"
                >
                <small class="form-hint">Formatos permitidos: PDF, Word, imágenes.</small>

                <footer class="form-actions">
                    <button type="reset" class="cancel-button">Cancelar</button>
                    <button type="submit" class="submit-button">Publicar tarea</button>
                </footer>
            </form>
        </section>
    </main>

    <script src="../scripts/assignments.js"></script>
</body>
</html>
